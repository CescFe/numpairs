name: Validate Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && !github.event.pull_request.draft)
      }}
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs=-Xmx2048m
        -Dorg.gradle.caching=true
        -Dorg.gradle.parallel=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;36.1.0
            platforms;android-36.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Spotless check
        run: ./gradlew spotlessCheck --build-cache --parallel

      - name: Run Android lint
        run: ./gradlew lintDebug --build-cache --parallel

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --build-cache --parallel

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
