name: Validate Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Android Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Android-relevant changes
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          base_sha="${BASE_SHA}"
          head_sha="${HEAD_SHA}"

          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            echo "android=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed_files.txt

          if grep -Eq '^(app/|buildSrc/|gradle/|[^/]+\.gradle\.kts$|gradle\.properties$|gradlew$|gradlew\.bat$|\.github/workflows/validate-android\.yml$)' changed_files.txt; then
            echo "android=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "android=false" >> "${GITHUB_OUTPUT}"

  validate:
    name: Build and Validate
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        needs.changes.outputs.android == 'true' &&
        (
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' && !github.event.pull_request.draft)
        )
      }}
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs=-Xmx2048m
        -Dorg.gradle.caching=true
        -Dorg.gradle.parallel=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;36.1.0
            platforms;android-36.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Spotless check
        run: ./gradlew spotlessCheck --build-cache --parallel

      - name: Run Android lint
        run: ./gradlew lintDebug --build-cache --parallel

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --build-cache --parallel

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
